<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Expense Auditor</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>AI Expense Auditor</h1>
    <p class="subtitle">Upload policy, upload receipt, then audit the expense.</p>

    <div class="card">
      <h2>1. Upload Policy PDF</h2>
      <form id="policyForm">
        <input type="file" id="policyFile" accept=".pdf" required />
        <button type="submit">Upload Policy</button>
      </form>
      <div id="policyStatus" class="status-box hidden"></div>
    </div>

    <div class="card">
      <h2>2. Upload Receipt</h2>
      <form id="uploadForm">
        <input type="file" id="receiptFile" required />
        <textarea id="description" placeholder="Business purpose" required></textarea>
        <button type="submit">Upload Receipt</button>
      </form>
      <div id="uploadStatus" class="status-box hidden"></div>
    </div>

    <div class="card">
      <h2>3. Audit Expense</h2>
      <form id="auditForm">
        <input type="text" id="filename" placeholder="Uploaded receipt filename" required />
        <select id="category" required>
          <option value="Meals">Meals</option>
          <option value="Transport">Transport</option>
          <option value="Lodging">Lodging</option>
        </select>
        <input type="number" id="claimedAmount" placeholder="Claimed Amount" step="0.01" required />
        <input type="date" id="claimedDate" required />
        <textarea id="businessPurpose" placeholder="Business purpose used for policy check" required></textarea>
        <button type="submit">Run Audit</button>
      </form>
      <div id="auditResult" class="result-box hidden">
        <pre id="resultContent"></pre>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
