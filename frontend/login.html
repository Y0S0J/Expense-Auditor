<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Expense Auditor</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <div class="page-shell">
    <div class="hero-card">
      <div class="brand-badge">AI Expense Auditor</div>
      <h1>Expense Governance Platform</h1>
      <p>
        Request claim approval, review pending requests, audit receipts, and
        manage outcomes in one workflow.
      </p>
      <button class="primary-btn" onclick="openLoginModal()">Login</button>
    </div>
  </div>

  <div class="modal-overlay hidden" id="loginModal">
    <div class="modal-card">
      <div class="modal-header">
        <h2>Login</h2>
        <button class="icon-btn" onclick="closeLoginModal()">✕</button>
      </div>

      <label>Role</label>
      <select id="role">
        <option value="employee">Employee</option>
        <option value="boss">Boss</option>
        <option value="auditor">Auditor</option>
      </select>

      <label id="userLabel">Employee ID</label>
      <input id="username" placeholder="Enter your ID" />

      <label>Password</label>
      <input id="password" type="password" placeholder="Enter password" />

      <button class="primary-btn full-width" onclick="login()">Continue</button>

      <div id="loginMessage" class="inline-message hidden"></div>

      <div class="helper-box">
        <div><strong>Demo credentials</strong></div>
        <div>Employee: E001 / emp123</div>
        <div>Boss: B001 / boss123</div>
        <div>Auditor: A001 / audit123</div>
      </div>
    </div>
  </div>

  <script src="/static/js/api.js"></script>
  <script src="/static/js/auth.js"></script>
</body>
</html>
